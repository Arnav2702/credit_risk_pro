{% load static %}
<html>
<head><link rel="stylesheet" href="{% static 'css/style.css' %}"></head>
<body>
    <div class="form-card">
        <div class="progress-bar"><div class="step active"></div><div class="step active"></div><div class="step"></div></div>
        <h2>Secure Account</h2>
        <form method="POST" action="{% url 'home_app:create_password' %}">
            {% csrf_token %}
            <div class="input-group"><label>Password</label><input type="password" name="password" required></div>
            <div class="input-group"><label>Confirm</label><input type="password" name="confirm_password" required></div>
            <button type="submit" class="btn-next">Set Password &rarr;</button>
        </form>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
