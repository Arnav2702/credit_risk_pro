{% load static %}
<html>
<head><link rel="stylesheet" href="{% static 'css/style.css' %}"></head>
<body>
    <div class="form-card">
        <h2>Login</h2>
        <form method="POST" action="{% url 'home_app:login' %}">
            {% csrf_token %}
            <div class="input-group"><label>Username</label><input type="text" name="username" required></div>
            <div class="input-group"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="btn-next">Login</button>
        </form>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
